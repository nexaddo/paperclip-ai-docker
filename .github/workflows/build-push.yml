name: Build and Push Docker Image

on:
  push:
    branches:
      - main
    paths:
      - 'Dockerfile'
      - '.github/workflows/build-push.yml'
  workflow_dispatch:
    inputs:
      paperclip_version:
        description: 'paperclipai npm version to build (e.g. 2026.325.0)'
        required: false
        default: ''

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve paperclipai version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.paperclip_version }}" ]; then
            VERSION="${{ github.event.inputs.paperclip_version }}"
          else
            # Parse pinned version from Dockerfile ARG
            VERSION=$(grep -m1 'ARG PAPERCLIP_VERSION=' Dockerfile | cut -d= -f2)
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Resolved version: $VERSION"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64
          build-args: |
            PAPERCLIP_VERSION=${{ steps.version.outputs.version }}
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
