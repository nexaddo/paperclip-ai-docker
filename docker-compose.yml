services:
  paperclip:
    image: ghcr.io/nexaddo/paperclip-ai-docker:latest
    container_name: paperclip
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      # Persistent data: DB, secrets, config, storage, backups
      - ./data:/data
    environment:
      # --- Required secrets (set in .env or Synology Docker env UI) ---
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      # Optional: expose additional keys your agents use
      # - GITHUB_TOKEN=${GITHUB_TOKEN}
      # - OPENAI_API_KEY=${OPENAI_API_KEY}
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3100/health', r => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
