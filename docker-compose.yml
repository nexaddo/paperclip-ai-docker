services:
  paperclip:
    image: ghcr.io/nexaddo/paperclip-ai-docker:latest
    container_name: paperclip
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      # Persistent data: DB, secrets, config, storage, backups
      - ./data:/data
    environment:
      # Deployment mode: authenticated binds to 0.0.0.0 (required for LAN/network access)
      - PAPERCLIP_DEPLOYMENT_MODE=authenticated
      - HOST=0.0.0.0
      - PORT=3100
      # Set this to the URL where the server is reachable from the network
      - PAPERCLIP_PUBLIC_URL=${PAPERCLIP_PUBLIC_URL:-http://localhost:3100}
      - NODE_ENV=production
      # --- LLM credentials (set in .env or your host's env UI) ---
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      # Optional additional provider keys
      # - GITHUB_TOKEN=${GITHUB_TOKEN}
      # - OPENAI_API_KEY=${OPENAI_API_KEY}
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3100/health', r => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
